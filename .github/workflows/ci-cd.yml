name: CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Install backend deps
        run: cd backend && npm ci

      - name: Lint backend
        run: |
          cd backend
          node --check server.js
          node --check routes/admin.js
          node --check routes/ai.js
          node --check routes/blog.js
          node --check routes/content.js
          node --check routes/security.js
          echo "✅ Tous les fichiers OK!"

  deploy-staging:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Deploy to staging
        run: echo "🚀 Déploiement staging"

  deploy-production:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - name: Deploy frontend to Vercel
        run: |
          npm install -g vercel
          cd frontend && vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Notify success
        run: |
          curl -X POST https://ntfy.sh/ademsassi-admin-2fa \
            -H "Title: ✅ Déploiement réussi" \
            -H "Priority: default" \
            -d "Portfolio déployé sur ademsassi.com — $(date)"
